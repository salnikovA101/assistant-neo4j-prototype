<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neo4j Voice Assistant</title>
    <meta name="description" content="Голосовой ИИ-ассистент для работы с графовой базой знаний Neo4j">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <!-- Main Panel -->
        <div id="main-content">
            <!-- Header/Top Bar -->
            <header id="top-bar">
                <div class="model-selector">
                    <span class="model-name">Neo4j Voice Assistant</span>
                </div>
                <div class="header-status-wrapper">
                    <span id="db-status-text">Подключение...</span>
                    <div class="header-indicator" id="connection-dot" title="Статус сервера"></div>
                </div>
            </header>

            <!-- Chat Container -->
            <main id="chat-messages">
                <div class="welcome-message">
                    <div class="welcome-logo">🧬</div>
                    <h2>Чем я могу помочь?</h2>
                    <p>Задайте вопрос голосом или текстом. Я проанализирую базу знаний Neo4j и предоставлю структурированный ответ с голосовой озвучкой.</p>
                </div>
            </main>

            <!-- Input Panel -->
            <footer id="input-panel">
                <div class="input-container">
                    <div class="input-wrapper">
                        <!-- Mic / Stop / Pause button inside wrapper -->
                        <button id="mic-btn" type="button" title="Голосовой ввод" aria-label="Микрофон">
                            <!-- Mic Icon -->
                            <svg id="mic-icon" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
                                <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
                            </svg>
                            <!-- Stop Icon (during recording) -->
                            <svg id="stop-icon" viewBox="0 0 24 24" fill="currentColor" style="display:none">
                                <rect x="6" y="6" width="12" height="12" rx="2"/>
                            </svg>
                            <!-- Pause Icon (during playing) -->
                            <svg id="pause-icon" viewBox="0 0 24 24" fill="currentColor" style="display:none">
                                <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
                            </svg>
                            <div class="recording-pulse"></div>
                        </button>

                        <!-- Input field -->
                        <input type="text" id="text-input" placeholder="Спросить Neo4j Assistant..." autocomplete="off">

                        <!-- Send button -->
                        <button id="send-btn" type="button" title="Отправить" aria-label="Отправить">
                            <svg viewBox="0 0 24 24" fill="currentColor">
                                <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                            </svg>
                        </button>
                    </div>
                </div>
            </footer>
        </div>
    </div>

    <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
